<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Presença - Jiu-Jitsu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-2xl font-bold text-amber-500 flex items-center gap-2">
                    <i class="fa-solid fa-user-ninja"></i> Jiu-Jitsu Social
                </h1>
                <p class="text-sm text-gray-400">Lista de Chamada e Controle de Frequência</p>
            </div>
            <button onclick="limparBancoDados()" class="text-xs bg-red-950/40 hover:bg-red-900/50 text-red-400 border border-red-900/60 py-2 px-3 rounded-lg transition-colors">
                <i class="fa-solid fa-trash"></i> Apagar Tudo
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-xl h-fit">
                <h2 class="text-lg font-bold mb-4 text-white flex items-center gap-2">
                    <i class="fa-solid fa-user-plus text-amber-500"></i> Cadastrar Aluno
                </h2>
                <form id="formCadastro" onsubmit="cadastrarAluno(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Nome da Criança
